<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Hub</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f7fb;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
    background:white;
}

.logo{
    font-size:22px;
    font-weight:700;
}

nav a{
    margin:0 15px;
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.btn{
    background:#2d6cdf;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:500;
}

/* Hero Section */
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:80px;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:48px;
    font-weight:700;
    margin-bottom:20px;
}

.hero-text p{
    color:#555;
    margin-bottom:30px;
}
q
.hero-text .btn{
    margin-right:15px;
}

/* Image */
.hero img{
    width:450px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Responsive */
@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero img{
        margin-top:40px;
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">P_Manager</div>
    <nav>
       
        <a href="#" class="btn">Get Started</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>Park Smarter,<br>Not Harder</h1>
        <p>
            Streamline your parking operations with real-time tracking, QR-based access,
            and comprehensive analytics. Experience a smarter future of parking management.
        </p>
      <a href="map.html" class="btn">Get Started</a>
        <a href="#">Learn More</a>
    </div>

    <img src="https://images.unsplash.com/photo-1506521781263-d8422e82f27a" alt="Parking Car">
</section>

</body>
</html>
